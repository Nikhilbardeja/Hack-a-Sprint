<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="dashboard.css" />

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div class="dashboard">
      <!-- ================= SIDEBAR ================= -->
      <div class="sidebar">
        <div class="brand">
          <i data-lucide="map-pin"></i>
          <span>CGT - Citizen</span>
        </div>

        <ul>
          <li class="active">
            <i data-lucide="layout-dashboard"></i> Dashboard
          </li>
          <li>
            <a href="Complaint.html">
              <i data-lucide="plus-circle"></i> Submit Complaint
            </a>
          </li>
          <li><i data-lucide="file-text"></i> My Complaints</li>
          <li>
            <a href="PublicFeed.html">
              <i data-lucide="plus-circle"></i> Public Feed
            </a>
          </li>
        </ul>
      </div>

      <!-- ================= MAIN ================= -->
      <div class="main">
        <!-- TOPBAR -->
        <div class="topbar">
          <div class="left">
            <h3>Citizen Dashboard</h3>
            <input
              type="text"
              placeholder="Search complaints..."
              class="search"
            />
          </div>

          <div class="right">
            <span id="userEmail">user@email.com</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>

        <!-- TITLE -->
        <h2 class="title">Overview</h2>

        <!-- CARDS -->
        <div class="cards">
          <div class="card">
            <i data-lucide="file-text" class="icon blue"></i>
            <h3 id="total">12</h3>
            <p>Total</p>
          </div>

          <div class="card">
            <i data-lucide="clock" class="icon yellow"></i>
            <h3 id="pending">5</h3>
            <p>Pending</p>
          </div>

          <div class="card">
            <i data-lucide="alert-triangle" class="icon cyan"></i>
            <h3 id="progress">3</h3>
            <p>In Progress</p>
          </div>

          <div class="card">
            <i data-lucide="check-circle" class="icon green"></i>
            <h3 id="resolved">4</h3>
            <p>Resolved</p>
          </div>
        </div>

        <!-- RECENT COMPLAINTS -->
        <div class="bottom-section">
          <h3>Recent Complaints</h3>

          <table class="complaint-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>

            <tbody id="complaintBody">
              <!-- JS will fill -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script>
      lucide.createIcons();

      // Dummy data (later replace with backend)
      const complaints = [
        { id: 101, title: "Water Leakage", status: "pending", date: "01 Apr" },
        {
          id: 102,
          title: "Street Light Issue",
          status: "progress",
          date: "30 Mar",
        },
        {
          id: 103,
          title: "Garbage Collection",
          status: "resolved",
          date: "28 Mar",
        },
      ];

      const tbody = document.getElementById("complaintBody");

      complaints.forEach((c) => {
        tbody.innerHTML += `
        <tr>
          <td>#${c.id}</td>
          <td>${c.title}</td>
          <td class="${c.status}">${c.status}</td>
          <td>${c.date}</td>
        </tr>
      `;
      });

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
