<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Complaint</title>

    <link rel="stylesheet" href="dashboard.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div class="dashboard">
      <!-- ================= SIDEBAR ================= -->
      <div class="sidebar">
        <div class="brand">
          <i data-lucide="map-pin"></i>
          <span>CGT - Citizen</span>
        </div>

        <ul>
          <li onclick="goTo('dashboard.html')">
            <i data-lucide="layout-dashboard"></i> Dashboard
          </li>

          <li class="active">
            <i data-lucide="plus-circle"></i> Submit Complaint
          </li>

          <li onclick="goTo('my-complaints.html')">
            <i data-lucide="file-text"></i> My Complaints
          </li>

          <li><i data-lucide="globe"></i> Public Feed</li>
        </ul>
      </div>

      <!-- ================= MAIN ================= -->
      <div class="main">
        <!-- TOPBAR -->
        <div class="topbar">
          <div class="left">
            <h3>Submit Complaint</h3>
          </div>

          <div class="right">
            <span id="userEmail">user@email.com</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>

        <!-- ================= FORM ================= -->
        <div class="form-section">
          <div class="form-card">
            <h2>Raise a Complaint</h2>

            <form onsubmit="submitComplaint(event)">
              <div class="input-group">
                <label>Complaint Title</label>
                <input type="text" id="title" required />
              </div>

              <div class="input-group">
                <label>Description</label>
                <textarea id="desc" rows="4" required></textarea>
              </div>

              <div class="input-group">
                <label>Address</label>
                <input type="text" id="address" required />
              </div>

              <div class="input-group">
                <label>Upload Image</label>
                <input type="file" />
              </div>

              <button class="submit-btn">Submit Complaint</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      function goTo(page) {
        window.location.href = page;
      }

      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }

      function submitComplaint(e) {
        e.preventDefault();

        const complaint = {
          id: Date.now(),
          title: document.getElementById("title").value,
          desc: document.getElementById("desc").value,
          address: document.getElementById("address").value,
          status: "pending",
          date: new Date().toLocaleDateString(),
        };

        let data = JSON.parse(localStorage.getItem("complaints")) || [];
        data.push(complaint);
        localStorage.setItem("complaints", JSON.stringify(data));

        alert("Complaint submitted!");
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
